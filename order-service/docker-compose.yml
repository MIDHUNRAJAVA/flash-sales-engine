version: '3.8'

services:
  order-service:
    build: .
    environment:
      - DB_HOST=postgres
      - NATS_URL=nats://nats:4222
      - DB_USER=user
      - DB_PASS=password
      - DB_NAME=flashsale
    depends_on:
      - postgres
      - nats

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=flashsale_user
      - POSTGRES_PASSWORD=FlashSalePass123
      - POSTGRES_DB=flashsale
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U flashsale_user -d flashsale" ]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:latest
    command: "-js"
    ports:
      - "4222:4222"
      - "8222:8222"
