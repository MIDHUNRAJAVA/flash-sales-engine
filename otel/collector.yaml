receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128
  batch:
    send_batch_size: 8192
    timeout: 200ms
  # Post-window policy. During the sale the SDKs head-sample 100%, so these
  # policies simply pass everything through.
  tail_sampling:
    decision_wait: 10s
    policies:
      - name: keep-all-errors
        type: status_code
        status_code:
          status_codes: [ERROR]
      - name: keep-slow-hotpath
        type: latency
        latency:
          threshold_ms: 500
      - name: sample-successes
        type: probabilistic
        probabilistic:
          sampling_percentage: 10

connectors:
  # Trace-derived Prometheus histograms. Invariant alerts read these metrics,
  # never raw (sampled, best-effort) spans — see plan deviation D6.
  spanmetrics:
    histogram:
      explicit:
        buckets: [1ms, 2ms, 5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2s]
    dimensions:
      - name: span.name
      - name: service.name

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  prometheus:
    endpoint: 0.0.0.0:8889

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, tail_sampling, batch]
      exporters: [otlp/tempo, spanmetrics]
    metrics/spanmetrics:
      receivers: [spanmetrics]
      exporters: [prometheus]
  telemetry:
    logs:
      level: warn
