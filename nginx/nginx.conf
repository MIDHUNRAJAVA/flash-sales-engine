# Layer 1 — IP/connection edge. Rejects at ~10x lower cost than the gateway.
# Correctness never depends on this file; it protects the latency SLO.
worker_processes auto;
worker_rlimit_nofile 1048576;

events {
    worker_connections 65536;
    multi_accept on;
}

http {
    # Per-IP limits. A NAT'd office fits inside 20 conns; a bot farm does not.
    limit_req_zone  $binary_remote_addr zone=perip:100m  rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=connip:100m;

    limit_req_status  429;
    limit_conn_status 429;

    # Slowloris / slow-body defense.
    client_header_timeout 5s;
    client_body_timeout   5s;
    send_timeout          10s;
    keepalive_timeout     15s;
    large_client_header_buffers 4 8k;

    upstream gateway_pool {
        server gateway:3000;
        keepalive 256;
    }

    server {
        listen 80 backlog=65535 reuseport;

        # Security headers on EVERY response, including nginx-generated errors.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;

        location = /buy {
            limit_req  zone=perip burst=20 nodelay;   # 10 r/s steady, 20 burst
            limit_conn connip 20;
            client_max_body_size 1k;                  # buy body ~200B; 1k is 5x headroom
            add_header Cache-Control "no-store" always;
            proxy_pass http://gateway_pool;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 6s;
        }

        location /queue/ {
            limit_req  zone=perip burst=30 nodelay;
            client_max_body_size 1k;
            add_header Cache-Control "no-store" always;
            proxy_pass http://gateway_pool;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            proxy_pass http://gateway_pool;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
