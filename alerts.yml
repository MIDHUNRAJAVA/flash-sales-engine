groups:
  - name: flash-sale-p1
    rules:
      - alert: OversellDetected
        expr: min_over_time(stock_remaining[1m]) < 0
        labels: { severity: P1 }
        annotations:
          summary: "Stock below zero — Lua layer bypassed. Freeze sale, audit Redis ACLs."
      - alert: StockLeaked
        expr: max(stock_remaining) == 0 and sum(orders_processed_total{result="success"}) < 2000
        for: 2m
        labels: { severity: P1 }
        annotations:
          summary: "Sold out but confirmed < 2000 for 2m — run audit equation (runbook S2)."
      - alert: CompensationFailed
        expr: increase(compensation_operations_total{result="failed"}[5m]) > 0
        labels: { severity: P1 }
        annotations:
          summary: "Compensation exhausted retries — disk journal is now system of record."
      - alert: ServerErrorBudgetBurn
        expr: |
          sum by (job) (rate(http_requests_total{status_code=~"5.."}[30s]))
            / sum by (job) (rate(http_requests_total[30s])) > 0.01
        for: 30s
        labels: { severity: P1 }
        annotations:
          summary: "5xx ratio > 1% for 30s on {{ $labels.job }}."

  - name: flash-sale-p2
    rules:
      - alert: StockDecrementSlow
        expr: |
          histogram_quantile(0.99,
            sum by (le) (rate(stock_decrement_duration_seconds_bucket[1m]))) > 0.010
        for: 60s
        labels: { severity: P2 }
        annotations: { summary: "Redis stock decrement p99 > 10ms for 60s." }
      - alert: PublishFailureRate
        expr: |
          sum(rate(publish_operations_total{result!="success"}[30s]))
            / clamp_min(sum(rate(publish_operations_total[30s])), 0.001) > 0.001
        for: 30s
        labels: { severity: P2 }
        annotations: { summary: "NATS publish failure ratio > 0.1% for 30s." }
      - alert: ConsumerLagHigh
        expr: nats_consumer_lag > 500
        for: 60s
        labels: { severity: P2 }
        annotations: { summary: "Order-service falling behind: lag > 500 for 60s." }

  - name: flash-sale-p3
    rules:
      - alert: RateLimitDominant
        expr: |
          sum(rate(rate_limit_decisions_total{result!="allowed"}[1m]))
            / clamp_min(sum(rate(rate_limit_decisions_total[1m])), 0.001) > 0.80
        for: 2m
        labels: { severity: P3 }
        annotations:
          summary: "429/shed > 80% — defense holding; verify it's bots, not humans."
      - alert: WaitingRoomDeep
        expr: waiting_room_depth > 50000
        labels: { severity: P3 }
        annotations: { summary: "Waiting room > 50k users." }
      - alert: PostgresInsertSlow
        expr: |
          histogram_quantile(0.99,
            sum by (le) (rate(db_insert_duration_seconds_bucket[1m]))) > 1
        for: 60s
        labels: { severity: P3 }
        annotations: { summary: "Postgres insert p99 > 1s for 60s." }
